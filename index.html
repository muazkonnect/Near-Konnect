    <style>
      #app-splash {
        position: fixed; inset: 0; z-index: 99999;
        display: flex; align-items: center; justify-content: center;
        background-color: hsl(220 15% 8%);
        background-image:
          radial-gradient(hsl(75 100% 62% / 0.10) 1.2px, transparent 1.2px),
          radial-gradient(hsl(0 0% 100% / 0.05) 1px, transparent 1px);
        background-size: 28px 28px, 14px 14px;
        background-position: 0 0, 7px 7px;
        transition: opacity 420ms ease, visibility 420ms ease;
      }
      #app-splash .splash-inner {
        display: flex; flex-direction: column; align-items: center; gap: 18px;
        animation: splash-pop 600ms cubic-bezier(.2,.8,.2,1) both;
      }
      #app-splash img { width: 168px; max-width: 60vw; height: auto; filter: drop-shadow(0 12px 32px hsl(75 100% 62% / 0.25)); }
      #app-splash .splash-ring {
        width: 36px; height: 36px; border-radius: 999px;
        border: 2.5px solid hsl(75 100% 62% / 0.25);
        border-top-color: hsl(75 100% 62%);
        animation: splash-spin 0.9s linear infinite;
      }
      #app-splash.is-hidden { opacity: 0; visibility: hidden; pointer-events: none; }
      @keyframes splash-spin { to { transform: rotate(360deg); } }
      @keyframes splash-pop { from { opacity: 0; transform: translateY(8px) scale(.96); } to { opacity: 1; transform: none; } }
      @media (prefers-reduced-motion: reduce) {
        #app-splash .splash-inner, #app-splash .splash-ring { animation: none; }
      }
    </style>
    <meta property="og:title" content="Near Konnect">
  <meta name="twitter:title" content="Near Konnect">
  <meta property="og:description" content="Near Konnect is the bridge between clients and local service providers. Discover, chat, and connect — we don&#39;t provide the services, we connect you to the people who do.">
  <meta name="twitter:description" content="Near Konnect is the bridge between clients and local service providers. Discover, chat, and connect — we don&#39;t provide the services, we connect you to the people who do.">
</head>

  <body>
    <div id="app-splash" aria-hidden="true">
      <div class="splash-inner">
        <img src="/favicon.svg" alt="Near Konnect" />
        <div class="splash-ring"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.hideHtmlSplash = () => {
        const splash = document.getElementById('app-splash');
        if (splash) {
          splash.classList.add('is-hidden');
        }
        if (window.Capacitor && navigator.splashscreen) {
          navigator.splashscreen.hide();
        }
      };
    </script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const splash = document.getElementById("app-splash");

        setTimeout(() => {
          splash.classList.add("is-hidden");

          if (window.Capacitor) {
            navigator.splashscreen?.hide();
          }
        }, 1500);
      });
    </script>
    <script>
      window.addEventListener("androidBackPressed", function () {
          if (window.history.length > 1) {
              window.history.back(); // previous page
          } else {
              if (window.Capacitor) {
                  navigator.app.exitApp(); // exit app
              }
          }
      });
    </script>
  </body>
