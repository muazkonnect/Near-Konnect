<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#14171f" />
    <title>You're offline · Near Konnect</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      :root {
        --bg: hsl(220 15% 8%);
        --fg: hsl(0 0% 100%);
        --muted: hsl(220 10% 65%);
        --primary: hsl(75 100% 62%);
        --primary-fg: hsl(220 15% 8%);
        --card: hsl(220 15% 12%);
        --border: hsl(220 13% 22%);
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--fg);
        background-image:
          radial-gradient(hsl(75 100% 62% / 0.10) 1.2px, transparent 1.2px),
          radial-gradient(hsl(0 0% 100% / 0.05) 1px, transparent 1px);
        background-size: 28px 28px, 14px 14px;
        background-position: 0 0, 7px 7px;
        display: flex; align-items: center; justify-content: center;
        padding: 24px;
        -webkit-font-smoothing: antialiased;
      }
      .card {
        max-width: 420px; width: 100%; text-align: center;
        background: var(--card); border: 1px solid var(--border);
        border-radius: 24px; padding: 36px 24px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      }
      .icon {
        width: 84px; height: 84px; border-radius: 50%;
        background: hsl(75 100% 62% / 0.12);
        display: inline-flex; align-items: center; justify-content: center;
        margin-bottom: 18px;
      }
      .icon svg { width: 44px; height: 44px; stroke: var(--primary); }
      h1 { font-size: 22px; margin: 0 0 8px; font-weight: 800; letter-spacing: -0.01em; }
      p { font-size: 14px; line-height: 1.5; color: var(--muted); margin: 0 0 20px; }
      button {
        font: inherit; cursor: pointer; border: 0;
        background: var(--primary); color: var(--primary-fg);
        font-weight: 700; padding: 12px 22px; border-radius: 14px;
        transition: transform .15s ease, opacity .15s ease;
        width: 100%;
      }
      button:hover { opacity: .92; }
      button:active { transform: scale(.98); }
      .hint { margin-top: 14px; font-size: 12px; color: var(--muted); }
      .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background: hsl(0 70% 55%); margin-right:6px; vertical-align:middle; box-shadow:0 0 0 4px hsl(0 70% 55% / 0.18); animation: pulse 1.6s ease-in-out infinite; }
      @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.5;} }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 1l22 22"/>
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
          <path d="M10.71 5.05A16 16 0 0 1 22.58 9"/>
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
          <line x1="12" y1="20" x2="12.01" y2="20"/>
        </svg>
      </div>
      <h1>You're offline</h1>
      <p>Near Konnect needs an internet connection. Check your Wi-Fi or mobile data and try again.</p>
      <button onclick="location.reload()">Try again</button>
      <div class="hint"><span class="dot"></span><span id="status">No connection detected</span></div>
    </main>
    <script>
      window.addEventListener('online', () => location.reload());
      const s = document.getElementById('status');
      setInterval(() => {
        s.textContent = navigator.onLine ? 'Reconnecting…' : 'No connection detected';
        if (navigator.onLine) location.reload();
      }, 2000);
    </script>
  </body>
</html>
